# This workflow has limitations -- Ubuntu lacks a redo package.
---
name: test
'on':
  pull_request:
    paths: &paths
      - '**/*.do'
      - app/**
      - cfg/**
      - README.adoc
      - .github/workflows/test.yml
  push:
    branches: [master]
    paths: *paths
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  BASE_REL: 0.9.20260404
jobs:
  test:
    strategy:
      matrix:
        os:
          - macos-14
          - macos-15
          - macos-15-intel
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3
      - run: |
          host=https://github.com/rdavid/shellbase
          brew install goredo
          curl \
            --location \
            --silent \
            "$host/archive/refs/tags/v$BASE_REL.tar.gz" |
            tar \
              --directory /usr/local/bin \
              --extract \
              --gzip \
              --strip-components=2 \
              shellbase-"$BASE_REL"/lib/base.sh
          redo -xx

---
name: actionlint
'on':
  pull_request:
    paths: &paths
      - .github/workflows/**
  push:
    branches: [master]
    paths: *paths
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  actionlint:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - id: get
        run: |
          ver=1.7.12
          srv=https://raw.githubusercontent.com/rhysd/actionlint
          curl \
            --fail \
            --location \
            --silent \
            "$srv/v$ver/scripts/download-actionlint.bash" |
            bash -s "$ver"
      - run: ${{ steps.get.outputs.executable }}

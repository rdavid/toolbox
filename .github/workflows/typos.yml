# Runs on every push and pull request with no path filter on purpose: typos
# checks spelling across the whole tree, so any file added or renamed anywhere
# must be revalidated.
---
name: typos
'on':
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  typos:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: crate-ci/typos@v1.48.0

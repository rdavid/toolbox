# Runs on every push and pull request with no path filter on purpose: REUSE
# verifies that every file carries copyright and license information, so any
# file added or renamed anywhere in the tree must be revalidated.
---
name: reuse
'on':
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  reuse:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: fsfe/reuse-action@v6.0.0

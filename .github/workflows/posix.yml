# Parses the utilities under strict POSIX shells. shellcheck performs static
# analysis only, while dash and mksh parse each script and reject syntax the
# project's target shells do not accept. The matrix shell name reaches the run
# block through an environment variable to keep the command free of template
# injection.
---
name: posix
'on':
  pull_request:
    paths: &paths
      - '**/*.do'
      - app/**
      - .github/workflows/posix.yml
  push:
    branches: [master]
    paths: *paths
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  posix:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      matrix:
        shell: [dash, mksh]
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - env:
          SHELL_BIN: ${{ matrix.shell }}
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes "$SHELL_BIN"
          rc=0
          for f in ./*.do ./app/*; do
            "$SHELL_BIN" -n "$f" || rc=1
          done
          exit "$rc"

---
name: vale
'on':
  pull_request:
    paths: &paths
      - README.adoc
      - .vale.ini
      - .github/styles/**
      - .github/workflows/vale.yml
  push:
    branches: [master]
    paths: *paths
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  vale:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3
      - run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes asciidoctor
      - uses: errata-ai/vale-action@2.1.2
        with:
          fail_on_error: true

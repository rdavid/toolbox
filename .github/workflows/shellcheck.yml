---
name: shellcheck
'on': [pull_request, push]
jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ludeeus/action-shellcheck@master
        with:
          # The app/pass is a Python script; excludes p* then restores pingo.
          additional_files: ./*.do ./app/[bcefimrsty]* ./app/pingo

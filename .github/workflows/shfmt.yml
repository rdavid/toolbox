---
name: shfmt
'on':
  pull_request:
    paths: &paths
      - '**/*.do'
      - app/**
      - .github/workflows/shfmt.yml
  push:
    branches: [master]
    paths: *paths
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  shfmt:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: mfinelli/setup-shfmt@v4.0.1
      - run: shfmt -d ./*.do ./app/*

# Audits all of .github for security issues with zizmor, matching the scope
# of the local redo lint target. GH_TOKEN is exported so zizmor can run its
# online audits, which query the GitHub API for action metadata; the local
# redo lint skips these through --offline.
---
name: zizmor
'on':
  pull_request:
    paths: &paths
      - .github/**
  push:
    branches: [master]
    paths: *paths
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  zizmor:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver=1.26.1
          pipx install zizmor=="$ver"
          zizmor .github
